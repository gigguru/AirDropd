name: Build macOS

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: AirDropd.app (macOS)
    strategy:
      matrix:
        include:
          - runner: macos-14
            macos_target: aarch64-apple-darwin
            artifact: AirDropd-macos-aarch64
            zip: AirDropd-macos-arm64.zip
          - runner: macos-13
            macos_target: x86_64-apple-darwin
            artifact: AirDropd-macos-x86_64
            zip: AirDropd-macos-x86_64.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.macos_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build AirDropd.app + zip
        env:
          MACOS_TARGET: ${{ matrix.macos_target }}
        run: |
          chmod +x apple/build-macos.sh apple/packaging/make-dmg.sh
          ./apple/build-macos.sh
          ls -la dist/

      - name: Upload AirDropd.app zip
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.zip }}
          if-no-files-found: error
          retention-days: 30

  dmg:
    name: AirDropd Setup.dmg (universal)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build universal app + professional DMG
        env:
          MACOS_TARGET: universal
        run: |
          chmod +x apple/build-macos.sh apple/packaging/make-dmg.sh
          ./apple/build-macos.sh
          ls -la dist/

      - name: Upload DMG + universal zip
        uses: actions/upload-artifact@v7
        with:
          name: AirDropd-macos-universal
          path: |
            dist/AirDropd Setup.dmg
            dist/AirDropd-macos-universal.zip
          if-no-files-found: error
          retention-days: 30
