name: Build Windows

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C target-feature=+crt-static
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: AirDropd.exe + Setup installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Sync application icons
        run: |
          pip install pillow
          python - <<'PY'
          import subprocess, sys
          from pathlib import Path
          root = Path(".")
          png = root / "assets" / "airdropd-icon.png"
          ico = root / "assets" / "airdropd.ico"
          from PIL import Image
          img = Image.open(png).convert("RGBA")
          img.save(ico, format="ICO", sizes=[(s, s) for s in [16, 24, 32, 48, 64, 128, 256]])
          print(f"Synced {ico}")
          PY

      - name: Build release
        run: cargo build --release --manifest-path windows/Cargo.toml

      - name: Verify single portable executable
        shell: pwsh
        run: |
          $releaseDir = "target/release"
          $exe = Join-Path $releaseDir "AirDropd.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "AirDropd.exe was not produced"
          }
          $dlls = Get-ChildItem $releaseDir -Filter "*.dll" -ErrorAction SilentlyContinue
          if ($dlls) {
            Write-Error "Unexpected DLLs in release output (not portable): $($dlls.Name -join ', ')"
          }
          $sizeMb = [math]::Round((Get-Item $exe).Length / 1MB, 2)
          Write-Host "Built portable AirDropd.exe ($sizeMb MB)"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build AirDropd Setup.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "windows\installer\AirDropd.iss"
          if (-not (Test-Path "dist\AirDropd Setup.exe")) {
            Write-Error "AirDropd Setup.exe was not produced"
          }

      - name: Upload portable executable
        uses: actions/upload-artifact@v7
        with:
          name: AirDropd-windows-x86_64
          path: target/release/AirDropd.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: AirDropd-Setup-windows-x86_64
          path: dist/AirDropd Setup.exe
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/release/AirDropd.exe
            dist/AirDropd Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
