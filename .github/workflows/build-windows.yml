name: Build Windows

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C target-feature=+crt-static
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Portable AirDropd.exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build release
        run: cargo build --release --bin AirDropd

      - name: Verify single portable executable
        shell: pwsh
        run: |
          $releaseDir = "target/release"
          $exe = Join-Path $releaseDir "AirDropd.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "AirDropd.exe was not produced"
          }
          $dlls = Get-ChildItem $releaseDir -Filter "*.dll" -ErrorAction SilentlyContinue
          if ($dlls) {
            Write-Error "Unexpected DLLs in release output (not portable): $($dlls.Name -join ', ')"
          }
          $sizeMb = [math]::Round((Get-Item $exe).Length / 1MB, 2)
          Write-Host "Built portable AirDropd.exe ($sizeMb MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: AirDropd-windows-x86_64
          path: target/release/AirDropd.exe
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: target/release/AirDropd.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
